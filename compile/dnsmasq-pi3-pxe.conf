# dnsmasq config for Pi 3 B+ network-boot (PXE proxy DHCP + TFTP).
#
# Usage (Mac side, terminal):
#   sudo /opt/homebrew/sbin/dnsmasq --no-daemon \
#        --conf-file=/Users/kodamay/projects/xinu-raz/xinu/compile/dnsmasq-pi3-pxe.conf
#
# Setup beforehand:
#   1. Mac's IP on the LAN that Pi 3 is on must be 192.168.3.199 (en0).
#      Edit `interface=` and `dhcp-range=` below if your IP differs.
#   2. /tftpboot exists and has Pi 3 firmware:
#        sudo mkdir -p /tftpboot
#        sudo cp /Volumes/XINU/bootcode.bin /tftpboot/
#        sudo cp /Volumes/XINU/start.elf    /tftpboot/
#        sudo cp /Volumes/XINU/fixup.dat    /tftpboot/
#        sudo cp /Volumes/XINU/config.txt   /tftpboot/
#        sudo cp /Volumes/XINU/bcm2710-rpi-3-b-plus.dtb /tftpboot/
#        sudo cp -r /Volumes/XINU/overlays  /tftpboot/
#        sudo cp ~/projects/xinu-raz/xinu/compile/xinu.boot /tftpboot/kernel.img
#   3. Pi 3 boot order = SD-then-network (default for Pi 3 B+).  To force
#      network boot, EITHER remove kernel.img from SD OR insert a blank SD.
#      Pi 3 B+ falls through to the network when SD has no bootable kernel.
#   4. Mac firewall must allow incoming DHCP (port 67/udp) + TFTP (port
#      69/udp) on en0.
#
# After this is running, "update Pi 3 kernel" =
#   cp ~/projects/xinu-raz/xinu/compile/xinu.boot /tftpboot/kernel.img
#   curl -X POST http://192.168.3.50:8080/reboot
# (or physical power cycle).  No SD swap.

# --- networking ---
# No DNS.  Use port 0 so we don't conflict with macOS resolver.
port=0
interface=en0
bind-interfaces
log-dhcp

# --- proxy DHCP (does NOT assign IPs — your router still does) ---
# 192.168.3.199 = this Mac's IP.  The "proxy" keyword tells dnsmasq to
# only answer the PXE-info part of DHCP, leaving normal address handout
# to whatever DHCP server the router runs.
dhcp-range=192.168.3.199,proxy

# --- TFTP serving the firmware ---
enable-tftp
tftp-root=/tftpboot

# --- PXE: tell Pi 3 to download bootcode.bin from this Mac ---
# Pi 3 B+ PXE client tag is "PXEClient:Arch:00000:UNDI:002001".
dhcp-boot=bootcode.bin,,192.168.3.199
pxe-service=0,"Raspberry Pi 3 B+ network boot"
